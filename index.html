<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room★ 学習ポータル</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght=400;700&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', 'Kosugi Maru', sans-serif;
            background-color: #fff5f5;
            background-image: radial-gradient(#e9d5d5 1px, transparent 1px);
            background-size: 20px 20px;
            color: #4a2c2a;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(74, 44, 42, 0.08), 0 1px 3px rgba(219, 39, 119, 0.05);
            border: 4px solid #4a2c2a;
            box-sizing: border-box;
        }
        
        .title-box {
            border: 2px solid #c4a4a1;
            background-color: #fdf8f7;
            border-radius: 16px;
            padding: 15px 10px;
            margin-bottom: 25px;
            text-align: center;
        }
        h1 {
            font-size: 1.6rem;
            color: #4a2c2a;
            margin: 0;
            font-weight: 700;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #db2777;
            margin: 5px 0 0 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .search-container {
            margin-bottom: 25px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 16px 20px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: #4a2c2a;
            background-color: #fdf8f7;
            border: 3px solid #c4a4a1;
            border-radius: 16px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }
        .search-input:focus {
            border-color: #db2777;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(219, 39, 119, 0.1);
        }
        .search-input::placeholder {
            color: #c4a4a1;
            font-weight: 400;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 16px;
        }
        
        a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: #7c2d12;
            color: #ffffff;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 6px 0 #4a1d0f;
            transition: all 0.15s ease;
            box-sizing: border-box;
            border: 2px solid #9a3412;
        }
        a:hover {
            background: #9d174d;
            border-color: #831843;
            box-shadow: 0 6px 0 #500724;
            transform: translateY(-2px);
        }
        a:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #500724;
        }
        
        .subject-badge {
            background-color: #4a2c2a;
            color: white;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-right: 6px;
            vertical-align: middle;
        }
        .page-badge {
            background-color: #dc2626;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            margin-right: 6px;
        }
        .ticket-title {
            vertical-align: middle;
            font-size: 0.95rem;
        }
        .arrow {
            font-size: 1.2rem;
            transition: transform 0.2s;
            margin-left: 10px;
        }
        a:hover .arrow {
            transform: translateX(4px);
        }
        .loading {
            text-align: center;
            color: #98716e;
            padding: 30px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        .error {
            color: #ffffff;
            background: #dc2626;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 0 #991b1b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-box">
        <h1>Room★ 学習ポータル</h1>
        <p class="subtitle">〜 今日のミッションを解き明かせ 〜</p>
    </div>
    
    <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="🔍 キーワード、単元名、ページ数で探す">
    </div>
    
    <div id="loading" class="loading">🍫 魔法のクレーンで全教科を覗き見中...</div>
    <ul id="link-list"></ul>
</div>

<script>
    // ==========================================
    // 🛠️ お父様の設定エリア
    // ==========================================
    const GITHUB_USER = "HHHKKKNata"; 
    const GITHUB_REPO = "study1"; 
    // ==========================================

    const SUBJECTS = [
        { id: 'math', name: '数学' },
        { id: 'english', name: '英語' },
        { id: 'science', name: '理科' },
        { id: 'social', name: '社会' },
        { id: 'japanese', name: '国語' }
    ];

    let allPages = [];

    async function loadAllPages() {
        const listElement = document.getElementById('link-list');
        const loadingElement = document.getElementById('loading');
        
        try {
            const fetchPromises = SUBJECTS.map(async (subj) => {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${subj.id}`;
                const response = await fetch(apiUrl);
                if (!response.ok) return [];
                
                const files = await response.json();
                
                // 「数字から始まる.html」に一致するファイルを抽出
                return files
                    .filter(file => file.name.match(/^\d+.*\.html$/))
                    .map(file => {
                        // ファイル名から「数字（ページ）」と「タイトル」を抜き出す
                        const match = file.name.match(/^(\d+)(.*?)\.html$/);
                        const pageNum = match[1];
                        const titleText = match[2] || "無題のページ"; // 日本語のサブタイトル部分

                        return {
                            fileName: file.name,
                            pageNum: pageNum,
                            titleText: titleText, // 追加：日本語タイトル
                            path: `${subj.id}/${file.name}`,
                            subjectName: subj.name
                        };
                    });
            });

            const results = await Promise.all(fetchPromises);
            allPages = results.flat();

            // ページ番号順に並び替え
            allPages.sort((a, b) => parseInt(a.pageNum, 10) - parseInt(b.pageNum, 10));

            loadingElement.style.display = 'none';
            renderList(allPages);

            // 🔍 リアルタイム検索（日本語のサブタイトルも検索対象に！）
            document.getElementById('search-bar').addEventListener('input', (e) => {
                const keyword = e.target.value.toLowerCase().trim();
                
                const filtered = allPages.filter(page => {
                    return page.subjectName.toLowerCase().includes(keyword) || 
                           page.titleText.toLowerCase().includes(keyword) || // サブタイトル検索に対応
                           page.pageNum.includes(keyword) ||
                           `p${page.pageNum}`.includes(keyword);
                });
                
                renderList(filtered);
            });

        } catch (error) {
            loadingElement.style.display = 'none';
            listElement.innerHTML = `<li class="error">⚠️ 工場データ取得エラー: ${error.message}</li>`;
        }
    }

    function renderList(pages) {
        const listElement = document.getElementById('link-list');
        listElement.innerHTML = '';

        if (pages.length === 0) {
            listElement.innerHTML = `<li class="loading">🎁 該当するミッションが見つかりません。</li>`;
            return;
        }

        pages.forEach(page => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            
            // チケットの中身に、抜き出した「日本語のサブタイトル」を表示！
            a.innerHTML = `
                <span>
                    <span class="subject-badge">${page.subjectName}</span>
                    <span class="page-badge">p.${page.pageNum}</span>
                    <span class="ticket-title">${page.titleText}</span>
                </span>
                <span class="arrow">▶</span>
            `;
            
            a.href = `./${page.path}`;
            
            li.appendChild(a);
            listElement.appendChild(li);
        });
    }

    loadAllPages();
</script>

</body>
</html>
